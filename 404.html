<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | Cameron Weyers</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --accent: #4A46C8;
      --bg: #ffffff;
      --text: #1A1A18;
      --muted: #5C5C58;
      --border: rgba(0,0,0,0.12);
      --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
    }

    main {
      width: min(100%, 560px);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 3rem 0;
    }

    p:first-child {
      margin: 0 0 0.75rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 500;
      line-height: 1.05;
    }

    p { margin: 0 0 1.5rem; color: var(--muted); }

    a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p>404</p>
    <h1>Page not found.</h1>
    <p>This page does not exist, but the portfolio is still where it should be.</p>
    <a href="/">Return to Cameron Weyers portfolio</a>
  </main>
</body>
</html>
